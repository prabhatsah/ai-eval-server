version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ai-eval-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_eval
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network

  postgres-test:
    image: postgres:15
    container_name: ai-eval-postgres-test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_eval_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - ai-network

volumes:
  postgres_data:
  postgres_test_data:

networks:
  ai-network:
