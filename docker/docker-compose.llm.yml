version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      ollama pull qwen2.5:7b;
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434

volumes:
  ollama_data: